<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360">
  <rect width="960" height="360" fill="#ffffff"/>
  <text x="480" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" fill="#222">Scene-referred와 Display-referred 흐름</text>
  <rect x="55" y="120" width="190" height="110" rx="8" fill="#e8f1ff" stroke="#2f6fed" stroke-width="2"/>
  <text x="150" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#18345c">Scene-referred</text>
  <text x="150" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#18345c">장면 빛 기준</text>
  <rect x="310" y="120" width="190" height="110" rx="8" fill="#fff1d8" stroke="#e19724" stroke-width="2"/>
  <text x="405" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#533700">Working Space</text>
  <text x="405" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#533700">grading / compositing</text>
  <rect x="565" y="120" width="190" height="110" rx="8" fill="#f5e9ff" stroke="#8952c5" stroke-width="2"/>
  <text x="660" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#432060">Display Transform</text>
  <text x="660" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#432060">tone/gamut mapping</text>
  <rect x="800" y="120" width="110" height="110" rx="8" fill="#e9f7ef" stroke="#2b9b58" stroke-width="2"/>
  <text x="855" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#174b2b">Display</text>
  <text x="855" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#174b2b">referred</text>
  <path d="M245 175 L310 175" stroke="#555" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M500 175 L565 175" stroke="#555" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M755 175 L800 175" stroke="#555" stroke-width="3" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#555"/></marker></defs>
  <text x="480" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#444">scene-referred는 장면의 빛 관계를, display-referred는 특정 표시 조건에서 보이는 결과를 기준으로 한다.</text>
</svg>
